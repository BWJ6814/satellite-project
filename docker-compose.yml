version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sat-postgres
    environment:
      POSTGRES_DB: satellite_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: sat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: sat-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data:
